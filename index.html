<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Karaoke</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Landing / Connect Screen -->
  <div id="login-screen" class="screen active">
    <div class="login-content">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="64" height="64" fill="currentColor">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        <h1>Spotify Karaoke</h1>
        <p>See synced lyrics for whatever you're playing</p>
      </div>
      <button id="connect-btn" class="btn-connect">Connect to Spotify</button>
    </div>
  </div>

  <!-- Main Karaoke Screen -->
  <div id="main-screen" class="screen">
    <!-- Now Playing Bar -->
    <div id="now-playing-bar">
      <div class="now-playing-inner">
        <img id="album-art" src="" alt="" class="album-art">
        <div class="track-info">
          <div id="track-name" class="track-name">Not Playing</div>
          <div id="artist-name" class="artist-name"></div>
        </div>
        <button id="disconnect-btn" class="btn-disconnect" title="Disconnect">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
          </svg>
        </button>
      </div>
      <div class="progress-container">
        <span id="progress-current" class="progress-time">0:00</span>
        <div class="progress-bar-track">
          <div id="progress-bar-fill" class="progress-bar-fill"></div>
        </div>
        <span id="progress-total" class="progress-time">0:00</span>
      </div>
    </div>

    <!-- Lyrics Area -->
    <div id="lyrics-wrapper" class="lyrics-wrapper">
      <div id="lyrics-container" class="lyrics-container">
        <div id="lyrics-content" class="lyrics-content">
          <div id="lyrics-spacer-top" class="lyrics-spacer"></div>
          <div id="lyrics-lines"></div>
          <div id="lyrics-spacer-bottom" class="lyrics-spacer"></div>
        </div>
      </div>
      <div id="status-message" class="status-message hidden">
        <p id="status-text"></p>
      </div>
      <div id="lyrics-source" class="lyrics-source hidden"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
