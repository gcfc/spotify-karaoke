<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Karaoke</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Landing / Connect Screen -->
  <div id="login-screen" class="screen active">
    <div class="login-content">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="64" height="64" fill="currentColor">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        <h1>Spotify Karaoke</h1>
        <p>See synced lyrics for whatever you're playing</p>
      </div>
      <button id="connect-btn" class="btn-connect">Connect to Spotify</button>
    </div>
  </div>

  <!-- Main Karaoke Screen -->
  <div id="main-screen" class="screen">
    <!-- Now Playing Bar -->
    <div id="now-playing-bar">
      <div class="now-playing-inner">
        <img id="album-art" src="" alt="" class="album-art">
        <div class="track-info">
          <div id="track-name" class="track-name">Not Playing</div>
          <div id="artist-name" class="artist-name"></div>
        </div>
        <div id="cjk-font-picker" class="cjk-font-picker hidden">
          <button type="button" class="cjk-picker-toggle" aria-haspopup="listbox">默认</button>
          <div class="cjk-picker-menu" role="listbox">
            <div class="cjk-picker-option" role="option" data-value="">默认</div>
            <div class="cjk-picker-option" role="option" data-value="Noto Serif SC">宋体</div>
            <div class="cjk-picker-option" role="option" data-value="Long Cang">龙藏体</div>
            <div class="cjk-picker-option" role="option" data-value="Ma Shan Zheng">马山正</div>
            <div class="cjk-picker-option" role="option" data-value="Zhi Mang Xing">志莽行</div>
            <div class="cjk-picker-option" role="option" data-value="ZCOOL XiaoWei">站酷小薇</div>
            <div class="cjk-picker-option" role="option" data-value="ZCOOL KuaiLe">站酷快乐</div>
          </div>
        </div>
        <button id="touch-control-toggle" class="btn-icon-toggle" title="Toggle touch control">
          <svg class="icon-touch-on" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M9 11.24V7.5a2.5 2.5 0 0 1 5 0v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6a1.5 1.5 0 0 0-3 0v9.02l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"/>
          </svg>
          <svg class="icon-touch-off" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M18.84 15.87l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6a1.5 1.5 0 0 0-3 0v9.02l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z" opacity="0.4"/>
          </svg>
        </button>
        <button id="theme-toggle" class="btn-icon-toggle" title="Toggle light/dark mode">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
          </svg>
        </button>
        <button id="disconnect-btn" class="btn-disconnect" title="Disconnect">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
          </svg>
        </button>
      </div>
      <div class="progress-container">
        <span id="progress-current" class="progress-time">0:00</span>
        <div class="progress-bar-track">
          <div id="progress-bar-fill" class="progress-bar-fill"></div>
        </div>
        <span id="progress-total" class="progress-time">0:00</span>
      </div>
    </div>

    <!-- Lyrics Area -->
    <div id="lyrics-wrapper" class="lyrics-wrapper">
      <div id="lyrics-container" class="lyrics-container">
        <div id="lyrics-content" class="lyrics-content">
          <div id="lyrics-spacer-top" class="lyrics-spacer"></div>
          <div id="lyrics-lines"></div>
          <div id="lyrics-spacer-bottom" class="lyrics-spacer"></div>
        </div>
      </div>
      <div id="status-message" class="status-message hidden">
        <p id="status-text"></p>
      </div>
      <div id="lyrics-source" class="lyrics-source hidden"></div>
      <div id="lyrics-offset" class="lyrics-offset hidden">
        <button class="offset-btn" data-delta="-1000">-1s</button>
        <button class="offset-btn" data-delta="-500">-0.5s</button>
        <button class="offset-btn offset-reset" data-delta="0">0.0s</button>
        <button class="offset-btn" data-delta="500">+0.5s</button>
        <button class="offset-btn" data-delta="1000">+1s</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
